<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=}, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>
<body>
    <h1>Formulario de Registro</h1>

<p>Complete la siguiente información para registrarse en la actividad académica.</p>

<form>

    <label for="nombre">Nombre completo:</label><br>
    <input type="text" id="nombre" name="nombre"><br><br>

    <label for="correo">Correo electrónico:</label><br>
    <input type="email" id="correo" name="correo"><br><br>

    <label for="telefono">Teléfono:</label><br>
    <input type="tel" id="telefono" name="telefono"><br><br>

    <label for="fecha">Fecha de nacimiento:</label><br>
    <input type="date" id="fecha" name="fecha"><br><br>

    <p>Modalidad preferida:</p>

    <input type="radio" id="virtual" name="modalidad" value="virtual">
    <label for="virtual">Virtual</label><br>

    <input type="radio" id="presencial" name="modalidad" value="presencial">
    <label for="presencial">Presencial</label><br><br>

    <p>Tecnologías de interés:</p>

    <input type="checkbox" id="html" value="html">
    <label for="html">HTML</label><br>

    <input type="checkbox" id="css" value="css">
    <label for="css">CSS</label><br>

    <input type="checkbox" id="javascript" value="javascript">
    <label for="javascript">JavaScript</label><br><br>

    <input type="submit" value="Enviar Registro">

</form>
</body>
</html>
